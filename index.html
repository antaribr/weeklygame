<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المشاركين</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 320px; margin: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #007bff; margin-bottom: 20px; }
        input { padding: 12px; width: 85%; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 24px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 93%; font-weight: bold; }
        button:hover { background-color: #218838; }
        #result { margin-top: 25px; font-size: 32px; font-weight: bold; color: #dc3545; padding: 10px; border-radius: 8px; }
        
        .updated { animation: flashEffect 0.3s ease-out; }
        @keyframes flashEffect {
            0% { background-color: #ffeeba; transform: scale(1.1); }
            100% { background-color: transparent; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h2>انضم للعبة الإدمن</h2>
    <input type="text" id="playerName" placeholder="اكتب اسمك الثلاثي...">
    <button onclick="register()">دخول سريع</button>
</div>

<div class="container" id="waitingBox" style="display: none;">
    <h2 id="welcomeMsg">مرحباً!</h2>
    <p style="color: #666;">انتظر كبسة الإدمن لتغيير الأرقام...</p>
    <div id="result">في الانتظار...</div>
</div>

<script>
    // فرض الاتصال المباشر عبر websocket لتجاوز أخطاء 404
    const socket = io("https://weeklygame-production.up.railway.app", {
        transports: ["websocket"]
    });

    function register() {
        const name = document.getElementById("playerName").value;
        if (name.trim() !== "") {
            socket.emit("register", name);
        } else {
            alert("الرجاء كتابة الاسم أولاً!");
        }
    }

    socket.on("registered_successfully", () => {
        const name = document.getElementById("playerName").value;
        document.getElementById("welcomeMsg").innerText = "مرحباً يا " + name;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("waitingBox").style.display = "block";
    });

    socket.on("your_number", (number) => {
        const resultDiv = document.getElementById("result");
        resultDiv.innerText = "رقمك: " + number;
        
        resultDiv.classList.remove("updated");
        void resultDiv.offsetWidth; 
        resultDiv.classList.add("updated");
    });

    socket.on("error_message", (msg) => {
        alert(msg);
    });
</script>

</body>
</html>
